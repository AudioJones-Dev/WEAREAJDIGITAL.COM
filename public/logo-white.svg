<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <filter id="glitch">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <text x="18" y="94" font-family="Impact, 'Arial Black', sans-serif" font-size="96" font-weight="900"
        letter-spacing="2" fill="#FFFFFF" filter="url(#glitch)">AJ</text>
  <text x="158" y="94" font-family="Impact, 'Arial Black', sans-serif" font-size="96" font-weight="900"
        letter-spacing="2" fill="#FFFFFF" filter="url(#glitch)">DIGITAL</text>
</svg>