name: Security Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly run, Mondays 12:00 UTC
    - cron: "0 12 * * 1"

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run npm audit
        # Non-destructive: report-only, no auto-fix.
        # Fails the job on high or critical vulnerabilities.
        run: npm audit --audit-level=high
