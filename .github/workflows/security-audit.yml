name: Security Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly run, Mondays 12:00 UTC
    - cron: "0 12 * * 1"

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Run npm audit
        # Non-destructive: report-only, no auto-fix.
        # `continue-on-error` keeps findings visible in the logs without
        # gating unrelated PRs on pre-existing transitive vulnerabilities.
        # Triage and dependency upgrades happen in dedicated PRs.
        continue-on-error: true
        run: npm audit --audit-level=high
